<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Hello!</title>
    
    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="/style.css">
    
    <!-- import the webpage's javascript file -->
    <script src="/script.js" defer></script>
  </head>  
  <body>
    <h1>Memory with Teemo</h1>
    
    <p>
      Welcome to the game! Try your best to imitate the teemo rhythm!
    </p>
    
    <button id="startBtn" onclick = "startGame()">
      Start
    </button>
    
    <button class = "hidden" id="stopBtn" onclick = "stopGame()">
      Stop
    </button>
    
    <div id = "gameButtonArea">
      <audio src = "https://cdn.glitch.com/5bbcf5ca-efd6-49a2-8748-5029c9fc592e%2Fyessir.mp3?v=1614631820391" id = "yessir"></audio>
      <audio src = "https://cdn.glitch.com/5bbcf5ca-efd6-49a2-8748-5029c9fc592e%2FHut.mp3?v=1614632985498" id = "hut"></audio>
      <audio src = "https://cdn.glitch.com/5bbcf5ca-efd6-49a2-8748-5029c9fc592e%2Freporting.mp3?v=1614633166708" id = "reporting"></audio>
      <audio src = "https://cdn.glitch.com/5bbcf5ca-efd6-49a2-8748-5029c9fc592e%2Fswiftly.mp3?v=1614633329687" id = "swiftly"></audio>
      <audio src = "https://cdn.glitch.com/5bbcf5ca-efd6-49a2-8748-5029c9fc592e%2Flaugh.mp3?v=1614633486221" id = "laugh"></audio>
      <audio src = "https://cdn.glitch.com/5bbcf5ca-efd6-49a2-8748-5029c9fc592e%2Fscout.mp3?v=1614633666678" id = "scout"></audio>
      <button id="button1" onmousedown = "startTone(1)" onmouseup ="stopTone(1)" onclick="guess(1)"></button>
      <button id="button2" onmousedown = "startTone(2)" onmouseup ="stopTone(2)" onclick="guess(2)"></button>
      <button id="button3" onmousedown = "startTone(3)" onmouseup ="stopTone(3)" onclick="guess(3)"></button>
      <button id="button4" onmousedown = "startTone(4)" onmouseup ="stopTone(4)" onclick="guess(4)"></button>
      <button id="button5" onmousedown = "startTone(5)" onmouseup ="stopTone(5)" onclick="guess(5)"></button>
      <button id="button6" onmousedown = "startTone(6)" onmouseup ="stopTone(6)" onclick="guess(6)"></button>
    </div>
    
    
  </body>
</html>
